name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # cache: pnpm  <- desactivado hasta que pnpm-lock.yaml esté commiteado

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Commit lockfile if generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml || true
          git diff --staged --quiet || git commit -m "chore: update pnpm-lock.yaml [skip ci]"
          git push || true

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
