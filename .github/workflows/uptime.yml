name: Uptime Check

on:
  schedule:
    # Cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping API & Web
    runs-on: ubuntu-latest
    steps:
      - name: Check API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://marketflux-api.fly.dev/health)
          echo "API status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::API health check failed with status $STATUS"
            exit 1
          fi

      - name: Check Web
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://marketflux.vercel.app)
          echo "Web status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Web health check failed with status $STATUS"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Uptime Alert: Service down at ${new Date().toISOString()}`,
              body: `Health check failed.\n\nWorkflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['incident', 'priority: critical']
            });
