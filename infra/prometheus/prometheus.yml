global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: 'production'
    app: 'marketflux'

scrape_configs:
  - job_name: 'marketflux-api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: '/metrics'
    scheme: http

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'
